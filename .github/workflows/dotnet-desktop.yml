name: CI Build

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ArcadeShellSelector.sln

    - name: Build (Release)
      run: dotnet build ArcadeShellSelector.sln -c Release --no-restore

    - name: Upload build output artifact
      uses: actions/upload-artifact@v4
      with:
        name: ArcadeShell-build-output
        path: bin/Release/net10.0-windows/**
        if-no-files-found: warn
