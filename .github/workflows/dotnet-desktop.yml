name: Build & Package

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ArcadeShellSelector.sln

    - name: Build (Release)
      run: dotnet build ArcadeShellSelector.sln -c Release --no-restore

    - name: Package with publish.ps1
      shell: pwsh
      run: ./publish.ps1 -SkipBuild -StripPdb

    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: ArcadeShell-release
        path: deploy/*.zip
        if-no-files-found: warn
