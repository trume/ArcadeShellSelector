name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Configure git identity
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Bump version in csproj
      id: version
      shell: pwsh
      run: |
        $csprojPath = "ArcadeShellSelector.csproj"
        [xml]$xml = Get-Content $csprojPath

        $pg = $xml.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
        if (-not $pg) { throw "<Version> not found in ArcadeShellSelector.csproj" }

        $current = "$($pg.Version)"
        if ($current -notmatch '^\d+\.\d+\.\d+$') {
          throw "Version '$current' is not SemVer core (Major.Minor.Patch)."
        }

        $parts = $current.Split('.')
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2]

        switch ("${{ github.event.inputs.bump }}") {
          "major" { $major++; $minor = 0; $patch = 0 }
          "minor" { $minor++; $patch = 0 }
          default { $patch++ }
        }

        $newVersion = "$major.$minor.$patch"
        $pg.Version = $newVersion

        if ($pg.InformationalVersion) {
          $pg.InformationalVersion = $newVersion
        }

        $xml.Save((Resolve-Path $csprojPath))

        "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Version bump: $current -> $newVersion"

    - name: Commit version bump
      shell: pwsh
      run: |
        git add ArcadeShellSelector.csproj
        git commit -m "chore(release): bump version to ${{ steps.version.outputs.new_version }}"

    - name: Push version bump to master
      shell: pwsh
      run: |
        git push origin HEAD:master

    - name: Create and push release tag
      shell: pwsh
      run: |
        $tag = "v${{ steps.version.outputs.new_version }}"

        if (git rev-parse $tag 2>$null) {
          throw "Tag $tag already exists."
        }

        git tag -a $tag -m "Release $tag"
        git push origin $tag

    - name: Build deployment zip
      shell: pwsh
      run: |
        ./publish.ps1 -Version "${{ steps.version.outputs.new_version }}" -StripPdb

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        files: deploy/*.zip
        generate_release_notes: true
