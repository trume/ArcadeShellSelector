name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump type
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-master
  cancel-in-progress: false

jobs:
  release:
    if: "${{ github.event_name != 'push' || (github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release): bump version to ')) }}"
    runs-on: windows-latest
    env:
      BUMP_TYPE: "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.bump || 'patch' }}"

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Configure git identity
      shell: pwsh
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

    - name: Bump version in csproj
      id: version
      shell: pwsh
      run: |
        $csprojPath = "ArcadeShellSelector.csproj"
        [xml]$xml = Get-Content $csprojPath

        $pg = $xml.Project.PropertyGroup | Where-Object { $_.Version } | Select-Object -First 1
        if (-not $pg) { throw "<Version> not found in ArcadeShellSelector.csproj" }

        $current = "$($pg.Version)"
        if ($current -notmatch '^\d+\.\d+\.\d+$') {
          throw "Version '$current' is not SemVer core (Major.Minor.Patch)."
        }

        $parts = $current.Split('.')
        $major = [int]$parts[0]
        $minor = [int]$parts[1]
        $patch = [int]$parts[2]

        switch ("$env:BUMP_TYPE") {
          "major" { $major++; $minor = 0; $patch = 0 }
          "minor" { $minor++; $patch = 0 }
          default { $patch++ }
        }

        $newVersion = "$major.$minor.$patch"
        $pg.Version = $newVersion

        if ($pg.InformationalVersion) {
          $pg.InformationalVersion = $newVersion
        }

        $xml.Save((Resolve-Path $csprojPath))

        "new_version=$newVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
        Write-Host "Version bump: $current -> $newVersion"

    - name: Commit version bump
      shell: pwsh
      run: |
        git add ArcadeShellSelector.csproj
        git commit -m "chore(release): bump version to ${{ steps.version.outputs.new_version }}"

    - name: Push version bump to master (rebase + retry)
      shell: pwsh
      run: |
        git fetch origin
        git rebase origin/master

        $ok = $false
        for ($i = 0; $i -lt 3 -and -not $ok; $i++) {
          git push origin HEAD:master
          if ($LASTEXITCODE -eq 0) {
            $ok = $true
            break
          }

          Start-Sleep -Seconds 2
          git fetch origin
          git rebase origin/master
        }

        if (-not $ok) {
          throw "Failed to push version bump after retries."
        }

    - name: Create and push release tag
      shell: pwsh
      run: |
        $tag = "v${{ steps.version.outputs.new_version }}"

        if (git rev-parse $tag 2>$null) {
          throw "Tag $tag already exists."
        }

        git tag -a $tag -m "Release $tag"
        git push origin $tag

    - name: Build deployment zip
      shell: pwsh
      run: |
        ./publish.ps1 -Version "${{ steps.version.outputs.new_version }}" -StripPdb

    - name: Build human-readable release notes
      shell: pwsh
      run: |
        $newTag = "v${{ steps.version.outputs.new_version }}"
        $repoUrl = "${{ github.server_url }}/${{ github.repository }}"
        $changelogUrl = "$repoUrl/blob/master/CHANGELOG.md"

        $prevTag = git tag --sort=-creatordate | Where-Object { $_ -ne $newTag } | Select-Object -First 1
        $compareUrl = if ($prevTag) { "$repoUrl/compare/$prevTag...$newTag" } else { "$repoUrl/releases/tag/$newTag" }

        if ($prevTag) {
          $commits = @(git log "$prevTag..HEAD" --pretty=format:"- %s" --no-merges)
        } else {
          $commits = @(git log --pretty=format:"- %s" --no-merges -n 20)
        }

        if (-not $commits -or $commits.Count -eq 0) {
          $commits = @("- Maintenance and reliability improvements.")
        }

        if ($commits.Count -gt 20) {
          $commits = $commits[0..19]
        }

        $commitText = $commits -join "`n"

        $body = @(
          "## Highlights",
          "",
          "This release includes reliability, packaging, and maintenance improvements for ArcadeShellSelector.",
          "",
          "## Human-Readable Changelog",
          "",
          $commitText,
          "",
          "## Full Changelog",
          "",
          "- Full project changelog: [$changelogUrl]($changelogUrl)",
          "- Diff since last tag: [$compareUrl]($compareUrl)"
        ) -join "`n"

        $body | Out-File -FilePath "release-notes.md" -Encoding utf8

    - name: Create GitHub release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.new_version }}
        name: v${{ steps.version.outputs.new_version }}
        files: deploy/*.zip
        body_path: release-notes.md
        generate_release_notes: true
